<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nue Studio | Professional Nail Salon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="logo-text">Nue Studio</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">HOME</a></li>
            <li><a href="#">SERVICES</a></li>
            <li><a href="#">BLOG</a></li>
            <li><a href="#">CONTACT</a></li>
        </ul>
        <div class="nav-cta">
            <a href="#" class="btn btn-dark">VIEW WORK</a>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-container">
            <div class="hero-left">
                <h1 class="hero-title">
                    Manicure And <br>
                    Pedicure <br>
                    <span class="accent">Nail Salon</span>
                </h1>
                <p class="hero-subtitle">Your journey to Elegance and Beauty starts with us</p>
                <div class="hero-cta">
                    <a href="#" class="btn btn-dark btn-hero">VIEW WORK</a>
                </div>
            </div>

            <div class="hero-right">
                <div class="arch-container">
                    <!-- Sparkles -->
                    <div class="sparkle sparkle-1">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 3v18M3 12h18" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="sparkle sparkle-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 3v18M3 12h18" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="sparkle sparkle-3">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 3v18M3 12h18" stroke-linecap="round"/>
                        </svg>
                    </div>
                    
                    <div class="image-arch">
                        <img src="assets/hero_portrait.png" alt="Beauty Portrait" class="hero-img">
                    </div>
                    
                    <!-- Decorative curly line -->
                    <div class="curvy-line">
                        <svg width="100" height="200" viewBox="0 0 100 200" fill="none">
                            <path d="M10 190C10 190 60 180 60 130C60 80 10 70 10 20" stroke="#b89060" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
